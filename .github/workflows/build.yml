name: Build Mordor APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack source and java parts
        run: |
          unzip -o source.zip -d .
          for f in java_part*.zip; do
            unzip -o "$f" -d .
          done
          cp mordor_release.jks java/app/mordor_release.jks

      - name: Patch stale signing config in build.gradle
        run: |
          python3 - << 'EOF'
          path = "java/app/build.gradle"
          with open(path) as f:
              content = f.read()
          content = content.replace(
              "storeFile file('C:\\\\AndroidStudioProjects\\\\key_app.jks')",
              "storeFile file('mordor_release.jks')"
          )
          content = content.replace("storePassword 'qwerty228'", "storePassword 'MordorRP2026!'")
          content = content.replace("keyAlias 'red_catqueen_mordor_apk'", "keyAlias 'mordor_key'")
          content = content.replace("keyPassword 'qwerty228'", "keyPassword 'MordorRP2026!'")
          content = content.replace(
              "implementation 'com.hzy:libp7zip:1.7.0'",
              "implementation 'com.github.hzy3774:AndroidP7zip:v1.7.2'"
          )
          content = content.replace(
              "implementation 'com.mikhaellopez:circularprogressbar:3.0.3'",
              "implementation 'com.mikhaellopez:circularprogressbar:3.1.0'"
          )
          content = content.replace(
              "implementation 'com.king.view:supertextview:1.0.1'",
              "implementation 'com.github.jenly1314:SuperTextView:1.0.1'"
          )
          content = content.replace(
              "implementation 'com.akexorcist:round-corner-progress-bar:2.1.1'",
              "implementation 'com.akexorcist:round-corner-progress-bar:2.2.0'"
          )
          content = content.replace(
              "apply plugin: 'com.google.firebase.crashlytics'",
              "apply plugin: 'com.google.firebase.crashlytics'\n\nconfigurations.all {\n    resolutionStrategy {\n        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.0'\n        force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.8.0'\n        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.0'\n        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.0'\n    }\n}"
          )
          with open(path, 'w') as f:
              f.write(content)
          EOF

      - name: Fix missing notification icon resource
        run: |
          sed -i 's#@drawable/ic_launcher_foreground_new#@mipmap/ic_launcher_adapt_foreground#' java/app/src/main/AndroidManifest.xml

      - name: Create placeholder google-services.json
        run: |
          cat > java/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mordor-rp-placeholder",
              "storage_bucket": "mordor-rp-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.mordor.game"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Install old NDK (r16b, needed for gnustl)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r16b-linux-x86_64.zip
          unzip -q android-ndk-r16b-linux-x86_64.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r16b" >> $GITHUB_ENV

      - name: Install legacy libs needed by old NDK toolchain
        run: |
          echo "deb http://archive.ubuntu.com/ubuntu jammy main universe" | sudo tee /etc/apt/sources.list.d/jammy.list
          sudo apt-get update
          sudo apt-get install -y libtinfo5 libncurses5
          sudo rm /etc/apt/sources.list.d/jammy.list
          sudo apt-get update

      - name: Build native library (ndk-build)
        run: |
          cd source/jni
          $ANDROID_NDK_HOME/ndk-build -j4

      - name: Copy .so into jniLibs
        run: |
          mkdir -p java/app/src/main/jniLibs/armeabi-v7a
          cp source/libs/armeabi-v7a/*.so java/app/src/main/jniLibs/armeabi-v7a/

      - name: Set up JDK 17 (for sdkmanager)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform/build-tools
        run: |
          sdkmanager "platforms;android-30" "build-tools;30.0.3"

      - name: Set up JDK 11 (for old Gradle/AGP build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build APK
        run: |
          cd java
          chmod +x gradlew
          ./gradlew assembleGameRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mordor-apk
          path: java/app/build/outputs/apk/game/release/*.apk
